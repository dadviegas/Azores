name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pages serves the site under `/<repo>/`. All three apps need this so
      # their chunks resolve correctly: `home` uses it as its `publicPath`,
      # and the federation manifests for `showcase`/`atlas` need to be
      # absolute URLs under the same prefix so the host can fetch them.
      PAGES_BASE: /${{ github.event.repository.name }}/
      AZORES_SHOWCASE_MANIFEST: /${{ github.event.repository.name }}/showcase/mf-manifest.json
      AZORES_ATLAS_MANIFEST: /${{ github.event.repository.name }}/atlas/mf-manifest.json
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the federated remotes first so their `mf-manifest.json` files
      # exist before the host references them. `publicPath: "auto"` in each
      # remote means chunk URLs are resolved at runtime from the actual
      # script location — they don't need PAGES_BASE baked in.
      - name: Build showcase (web)
        run: pnpm --filter @azores/web build

      - name: Build atlas
        run: pnpm --filter @azores/atlas build

      - name: Build home (host)
        run: pnpm --filter @azores/home build

      # Assemble a single static tree:
      #   dist/                 ← home
      #   dist/showcase/        ← apps/web
      #   dist/atlas/           ← apps/atlas
      # The home host's federation config points at /<repo>/showcase/mf-manifest.json
      # and /<repo>/atlas/mf-manifest.json (set above via env), so this layout
      # is what those URLs resolve against.
      - name: Assemble Pages artifact
        run: |
          mkdir -p dist
          cp -R apps/home/dist/. dist/
          mkdir -p dist/showcase dist/atlas
          cp -R apps/web/dist/. dist/showcase/
          cp -R apps/atlas/dist/. dist/atlas/
          # Standalone HTML previews (no app shell, no MF) so they can be
          # opened directly on a phone without booting the full host.
          cp docs/character-preview.html dist/character-preview.html

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
