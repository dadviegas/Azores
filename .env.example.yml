# YAML alternative to `.env`. Copy to `.env.yml` (gitignored) for local dev.
# Nested keys are flattened with `_` and uppercased:
#   api: { key: x }  ->  API_KEY=x
# `.env.yml` takes precedence over `.env.yaml`, which takes precedence over `.env`.

NODE_ENV: development

app:
  name: azores
  port: 3000
  public_url: http://localhost:3000

api:
  base_url: http://localhost:3001
  key: replace-me-locally

# Public path for the bundled web app (rspack output.publicPath).
# "/" locally; "/<repo-name>/" on GitHub Pages.
pages_base: /
