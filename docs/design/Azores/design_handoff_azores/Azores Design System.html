<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Azores · Design System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="components.css" />
<link rel="stylesheet" href="markdown.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled />
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
  // Swap hljs theme with the app theme
  function syncHljsTheme() {
    const dark = document.documentElement.getAttribute("data-theme") === "dark";
    document.getElementById("hljs-light").disabled = dark;
    document.getElementById("hljs-dark").disabled = !dark;
  }
  new MutationObserver(syncHljsTheme).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });
  syncHljsTheme();
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="page-foundations.jsx"></script>
<script type="text/babel" src="page-components.jsx"></script>
<script type="text/babel" src="page-ui.jsx"></script>
<script type="text/babel" src="page-ux.jsx"></script>
<script type="text/babel" src="page-backgrounds.jsx"></script>
<script type="text/babel" src="page-icons.jsx"></script>
<script type="text/babel" src="page-markdown.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const NAV = [
  { id: "foundations", label: "Foundations", icon: "palette", group: "AZORES UI" },
  { id: "components",  label: "Components",  icon: "box",     group: "AZORES UI" },
  { id: "backgrounds", label: "Backgrounds", icon: "sparkles", group: "AZORES UI" },
  { id: "icons",       label: "Icons",       icon: "sparkle",  group: "AZORES UI" },
  { id: "ui",          label: "UI showcase", icon: "layout",  group: "AZORES UI" },
  { id: "ux",          label: "UX dashboard", icon: "dashboard", group: "AZORES UX" },
  { id: "markdown",    label: "Markdown",    icon: "bookopen", group: "AZORES UX" },
];

function App() {
  const [page, setPage] = useState("foundations");
  const [theme, setTheme] = useState(() => localStorage.getItem("az-theme") || "light");
  const [accent, setAccent] = useState(() => localStorage.getItem("az-accent") || "ocean");

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("az-theme", theme);
  }, [theme]);
  useEffect(() => {
    document.documentElement.setAttribute("data-accent", accent);
    localStorage.setItem("az-accent", accent);
  }, [accent]);

  const groups = [...new Set(NAV.map(n => n.group))];

  // For UX page, render full-bleed (no app shell padding)
  const isFullBleed = page === "ux" || page === "markdown";

  let Page = null;
  if (page === "foundations") Page = window.Foundations;
  else if (page === "components") Page = window.ComponentsPage;
  else if (page === "backgrounds") Page = window.BackgroundsPage;
  else if (page === "icons") Page = window.IconsPage;
  else if (page === "ui") Page = window.UIShowcase;
  else if (page === "ux") Page = window.UXDashboard;
  else if (page === "markdown") Page = window.MarkdownPage;

  return (
    <div className="az-app">
      <aside className="az-sidebar">
        <div className="az-brand">
          <div className="az-brand-mark">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 11 Q 5 8 8 11 T 14 11" stroke="white" strokeWidth="1.5" fill="none" />
              <path d="M2 8 Q 5 5 8 8 T 14 8" stroke="white" strokeWidth="1.5" opacity="0.6" fill="none" />
            </svg>
          </div>
          <div>
            <div className="az-brand-name">Azores</div>
            <div className="az-brand-tag">DESIGN SYSTEM</div>
          </div>
        </div>

        <nav className="az-nav">
          {groups.map(g => (
            <React.Fragment key={g}>
              <div className="az-nav-section">{g}</div>
              {NAV.filter(n => n.group === g).map(n => (
                <button key={n.id} className={`az-nav-item ${page === n.id ? "is-active" : ""}`} onClick={() => setPage(n.id)}>
                  <Icon name={n.icon} className="az-nav-icon" />{n.label}
                </button>
              ))}
            </React.Fragment>
          ))}
        </nav>
      </aside>

      <main className="az-main">
        <div className="az-topbar">
          <div className="az-topbar-title">{NAV.find(n => n.id === page)?.label}</div>
          <span className="az-badge az-badge--ocean">v1.0</span>
          <div className="az-topbar-spacer"></div>

          {/* Accent picker */}
          <div className="az-theme-picker">
            {[
              ["ocean",    "#0F4C75", "#D5582A"],
              ["volcanic", "#2F6E42", "#B84417"],
              ["mono",     "#14161A", "#7A7E87"],
              ["violet",   "#5B3DA0", "#D5582A"],
            ].map(([k, p1, p2]) => (
              <button key={k} className={`az-theme-swatch ${accent === k ? "is-active" : ""}`}
                title={k} onClick={() => setAccent(k)}
                style={{ "--p1": p1, "--p2": p2 }} />
            ))}
          </div>
          <div className="az-sep"></div>
          <button className="az-btn az-btn--ghost az-btn--icon az-btn--sm" onClick={() => setTheme(theme === "dark" ? "light" : "dark")} title="Toggle theme">
            <Icon name={theme === "dark" ? "sun" : "moon"} />
          </button>
          <button className="az-btn az-btn--icon az-btn--sm"><Icon name="git" /></button>
        </div>

        {Page ? <Page /> : <div style={{ padding: 40 }}>Loading…</div>}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
